name: PR Approval Gate

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  pull_request_review:
    types:
      - submitted
      - dismissed

permissions:
  contents: read
  pull-requests: read

jobs:
  pull-request-approval:
    name: pull-request-approval
    runs-on: ubuntu-latest

    steps:
      - name: Require contributor approval on latest commit
        uses: actions/github-script@v9
        with:
          script: |
            const pullRequest = context.payload.pull_request;

            if (!pullRequest) {
              core.setFailed("This workflow must run from a pull request event.");
              return;
            }

            const exemptAuthors = new Set(["RodrigoMeloMarcolino"]);

            if (exemptAuthors.has(pullRequest.user.login)) {
              core.info(
                `Approval gate skipped because ${pullRequest.user.login} is an exempt PR author.`
              );
              return;
            }

            const allowedAssociations = new Set([
              "OWNER",
              "MEMBER",
              "COLLABORATOR",
              "CONTRIBUTOR",
            ]);

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullRequest.number,
              per_page: 100,
            });

            const latestReviewByUser = new Map();

            for (const review of reviews) {
              if (!review.user || review.user.type === "Bot") {
                continue;
              }

              latestReviewByUser.set(review.user.login, review);
            }

            const approvals = [...latestReviewByUser.values()].filter((review) => {
              return (
                review.state === "APPROVED" &&
                review.commit_id === pullRequest.head.sha &&
                review.user.login !== pullRequest.user.login &&
                allowedAssociations.has(review.author_association)
              );
            });

            if (approvals.length === 0) {
              core.setFailed(
                "Este PR precisa de pelo menos um approve de um contribuidor no commit atual."
              );
              return;
            }

            core.info(`Approval gate satisfied by ${approvals[0].user.login}.`);
