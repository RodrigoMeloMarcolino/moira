services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: moira_test
      POSTGRES_USER: moira
      POSTGRES_PASSWORD: moira
    ports:
      - "127.0.0.1::5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moira -d moira_test"]
      interval: 1s
      timeout: 3s
      retries: 30
